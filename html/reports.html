<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports | X-Intelligence</title>
  <!-- Core Tailwind, Fonts & Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="head.js"></script>
  <script src="shell.js" defer></script>
</head>
<body class="bg-[#fafafa] text-[#0a0a0a] overflow-hidden h-screen font-sans">

  <div id="app" class="flex h-screen overflow-hidden">
    <!-- Main content area where shell.js will prepend sidebar and topbar -->
    <div id="main-content" class="flex-1 flex flex-col overflow-hidden">
      
      <!-- Workspace Container (32px padding per CLAUDE.md) -->
      <main class="flex-1 overflow-y-auto p-8 space-y-6">
        
        <!-- Header Actions & Reports Title -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
          <div>
            <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Compliance Audits &amp; Export Center</h2>
            <p class="text-xs text-gray-400 mt-0.5">Generate regulatory PDF dossiers and spreadsheet audit trails</p>
          </div>
          <div class="flex items-center gap-2 select-none">
            <button onclick="triggerGenerateReport()" class="h-9 px-4 bg-teal hover:bg-[#00c47e] text-white text-xs font-semibold rounded flex items-center gap-1.5 transition-colors" id="btn-generate">
              <i data-lucide="file-text" class="w-4 h-4"></i>
              <span>Generate Custom Report</span>
            </button>
          </div>
        </div>

        <!-- Horizontal Sub-Tabs Selection (White card styled) -->
        <div class="flex border-b border-[#e5e5e5] gap-4 select-none">
          <button onclick="switchTab('screening')" id="tab-screening" class="pb-3 px-1 border-b-2 border-teal text-navy font-semibold text-sm transition-all flex items-center gap-2">
            <i data-lucide="shield-check" class="w-4 h-4"></i>
            <span>Screening Reports</span>
          </button>
          <button onclick="switchTab('audit')" id="tab-audit" class="pb-3 px-1 border-b-2 border-transparent text-gray-500 hover:text-navy font-medium text-sm transition-all flex items-center gap-2">
            <i data-lucide="history" class="w-4 h-4"></i>
            <span>Audit Trails</span>
          </button>
          <button onclick="switchTab('database')" id="tab-database" class="pb-3 px-1 border-b-2 border-transparent text-gray-500 hover:text-navy font-medium text-sm transition-all flex items-center gap-2">
            <i data-lucide="database" class="w-4 h-4"></i>
            <span>Database Updates</span>
          </button>
          <button onclick="switchTab('batch')" id="tab-batch" class="pb-3 px-1 border-b-2 border-transparent text-gray-500 hover:text-navy font-medium text-sm transition-all flex items-center gap-2">
            <i data-lucide="files" class="w-4 h-4"></i>
            <span>Batch Run Summaries</span>
          </button>
        </div>

        <!-- Filters Row (White card, border only) -->
        <div class="bg-white rounded-xl border border-[#e5e5e5] p-6">
          <form onsubmit="applyReportFilters(event)" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4 text-xs font-semibold">
            
            <!-- Date From -->
            <div>
              <label class="block text-[10px] font-semibold text-gray-500 uppercase mb-1">Date From</label>
              <input type="date" id="filter-date-from" class="w-full h-9 px-2 border border-gray-300 rounded focus:ring-2 focus:ring-teal/25 focus:border-teal focus:outline-none">
            </div>

            <!-- Date To -->
            <div>
              <label class="block text-[10px] font-semibold text-gray-500 uppercase mb-1">Date To</label>
              <input type="date" id="filter-date-to" class="w-full h-9 px-2 border border-gray-300 rounded focus:ring-2 focus:ring-teal/25 focus:border-teal focus:outline-none">
            </div>

            <!-- Report Type -->
            <div>
              <label class="block text-[10px] font-semibold text-gray-500 uppercase mb-1">Scope</label>
              <div class="relative">
                <select id="filter-scope" class="w-full h-9 pl-2 pr-8 border border-gray-300 rounded focus:ring-2 focus:ring-teal/25 focus:border-teal focus:outline-none cursor-pointer appearance-none">
                  <option value="ALL">All Categories</option>
                  <option value="Individual">Individuals Only</option>
                  <option value="Entity">Corporates Only</option>
                  <option value="Vessel">Vessels Only</option>
                </select>
                <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-gray-400 absolute right-2.5 top-2.5 pointer-events-none"></i>
              </div>
            </div>

            <!-- Analyst/User -->
            <div>
              <label class="block text-[10px] font-semibold text-gray-500 uppercase mb-1">Triggered By User</label>
              <div class="relative">
                <select id="filter-user" class="w-full h-9 pl-2 pr-8 border border-gray-300 rounded focus:ring-2 focus:ring-teal/25 focus:border-teal focus:outline-none cursor-pointer appearance-none">
                  <option value="ALL">All Team Members</option>
                  <option value="Vilas Limbu">Vilas Limbu</option>
                  <option value="Alok Desai">Alok Desai</option>
                  <option value="Audit Automator">Audit Automator</option>
                  <option value="System">System Processes</option>
                </select>
                <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-gray-400 absolute right-2.5 top-2.5 pointer-events-none"></i>
              </div>
            </div>

            <!-- Export format and buttons -->
            <div class="flex items-end gap-2">
              <button type="submit" class="h-9 flex-1 bg-[#001741] hover:bg-[#000f33] text-white font-semibold rounded flex items-center justify-center gap-1.5 transition-colors">
                <i data-lucide="filter" class="w-3.5 h-3.5"></i>
                <span>Filter Logs</span>
              </button>
              <button type="button" onclick="resetReportFilters()" class="h-9 px-3 border border-gray-300 hover:bg-gray-50 text-gray-600 rounded transition-all">
                Reset
              </button>
            </div>

          </form>
        </div>

        <!-- Table Results Card -->
        <div class="bg-white rounded-xl border border-[#e5e5e5] overflow-hidden" id="report-card-container">
          
          <!-- Table Toolbar -->
          <div class="p-4 border-b border-[#e5e5e5] bg-gray-50 flex items-center justify-between shrink-0 select-none">
            <span class="text-xs font-semibold text-gray-900 uppercase" id="table-logs-title">Screening Activity Records</span>
            
            <div class="flex items-center gap-2">
              <span class="text-xs text-gray-400 font-semibold" id="table-logs-count">Showing 3 records</span>
            </div>
          </div>

          <!-- Dynamic Table -->
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse" id="reports-table">
              <thead id="reports-thead">
                <!-- Injected via javascript -->
              </thead>
              <tbody class="divide-y divide-[#e5e5e5] text-xs text-gray-700 font-medium" id="reports-tbody">
                <!-- Injected via javascript -->
              </tbody>
            </table>
          </div>

        </div>

      </main>

    </div>
  </div>



  <script>
    // Lucide initialization
    window.addEventListener("load", () => {
      switchTab('screening'); // Render the initial default tab
    });

    let currentTab = 'screening';

    // Mock Data Store
    const screeningData = [
      { id: "HHFSL2026M1", name: "Bakar Hasnain", type: "Individual", result: "True Hit (4 Alerts Unresolved)", date: "2026-06-16 19:12", user: "Vilas Limbu" },
      { id: "HHFSL2026M2", name: "Severstal PAO Holding", type: "Entity", result: "True Hit (Resolved)", date: "2026-06-15 14:21", user: "Audit Automator" },
      { id: "HHFSL2026M3", name: "Njord Shipping Ltd", type: "Vessel", result: "Cleared", date: "2026-06-12 09:33", user: "Alok Desai" }
    ];

    const auditData = [
      { id: "AUD-9032", event: "Risk Level Override", target: "HHFSL2026M2", user: "Vilas Limbu", time: "2026-06-16 21:04", action: "Risk re-rated to Low", comment: "Adjusted based on legal counsel review" },
      { id: "AUD-8941", event: "Alert Disposal Decision", target: "HHFSL2026M2", user: "Audit Automator", time: "2026-06-15 14:21", action: "Resolved as False Positive", comment: "DOB overlap does not align with PEP watchlist" },
      { id: "AUD-8762", event: "Scheduler Synchronization", target: "System Sync", user: "System", time: "2026-06-16 04:00", action: "Database refreshed", comment: "Daily World-Check updates matched automatically" }
    ];

    const databaseData = [
      { reference: "UN Sanctions watchlists", provider: "UN Security Council", status: "Success", records: "124,563", insertions: "48", deletions: "12", syncDate: "2026-06-16 04:00 GMT" },
      { reference: "OFAC Sanction Registry (US)", provider: "US Treasury Dept", status: "Success", records: "84,192", insertions: "114", deletions: "42", syncDate: "2026-06-15 18:22 GMT" },
      { reference: "EU Consolidated Financial Freeze", provider: "European Union Council", status: "Success", records: "51,902", insertions: "22", deletions: "8", syncDate: "2026-06-12 11:45 GMT" }
    ];

    const batchData = [
      { id: "BTC-001", name: "Client NBFI Batch", scope: "Entity", size: "112", rate: "98.2%", matches: "12", unresolved: "2", compDate: "2026-06-16 04:00 GMT" },
      { id: "BTC-002", name: "Key Personnel Roster", scope: "Individual", size: "85", rate: "100%", matches: "22", unresolved: "4", compDate: "2026-06-16 04:00 GMT" },
      { id: "BTC-003", name: "Online Portal Users", scope: "Individual", size: "142", rate: "100%", matches: "4", unresolved: "2", compDate: "2026-06-12 11:30 GMT" }
    ];

    // Swap sub-tabs
    function switchTab(tabId) {
      currentTab = tabId;
      const tabs = ['screening', 'audit', 'database', 'batch'];
      
      tabs.forEach(t => {
        const btn = document.getElementById(`tab-${t}`);
        if (t === tabId) {
          btn.className = "pb-3 px-1 border-b-2 border-teal text-navy font-semibold text-sm transition-all flex items-center gap-2";
        } else {
          btn.className = "pb-3 px-1 border-b-2 border-transparent text-gray-500 hover:text-navy font-medium text-sm transition-all flex items-center gap-2";
        }
      });

      renderTable();
    }

    // Render columns and rows dynamically
    function renderTable(dataOverride = null) {
      const thead = document.getElementById("reports-thead");
      const tbody = document.getElementById("reports-tbody");
      const title = document.getElementById("table-logs-title");
      const countLabel = document.getElementById("table-logs-count");

      let tableHeadHtml = "";
      let tableBodyHtml = "";
      let dataList = [];

      if (currentTab === 'screening') {
        title.innerText = "Screening Activity Logs";
        dataList = dataOverride || screeningData;
        countLabel.innerText = `Showing ${dataList.length} screening case records`;

        tableHeadHtml = `
          <tr class="bg-gray-50 border-b border-[#e5e5e5] text-xs font-semibold text-gray-500 uppercase tracking-wider">
            <th class="py-3 px-4 font-mono w-32">Profile ID</th>
            <th class="py-3 px-4">Searched Target Name</th>
            <th class="py-3 px-4 w-28 text-center">Type</th>
            <th class="py-3 px-4">Screening Result</th>
            <th class="py-3 px-4 font-mono w-44">Timestamp</th>
            <th class="py-3 px-4">Triggered Analyst</th>
            <th class="py-3 px-4 text-right w-24">Export</th>
          </tr>
        `;

        tableBodyHtml = dataList.map(item => {
          const typeBadge = item.type === 'Individual' 
            ? `<span class="px-1.5 py-0.5 rounded bg-teal-light text-navy text-[10px] font-mono">Individual</span>`
            : `<span class="px-1.5 py-0.5 rounded bg-blue-50 text-blue-700 text-[10px] font-mono">${item.type}</span>`;
            
          const resultBadge = item.result.includes("Cleared")
            ? `<span class="px-2.5 py-0.5 rounded-full text-[10px] font-semibold bg-[#f0fdf4] text-[#15803d] border border-[#86efac]">Cleared</span>`
            : (item.result.includes("Resolved") 
              ? `<span class="px-2.5 py-0.5 rounded-full text-[10px] font-semibold bg-gray-100 text-gray-600 border border-gray-200">${item.result}</span>`
              : `<span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-[#fee2e2] text-[#ef4444] border border-[#ef4444]/20">${item.result}</span>`);

          return `
            <tr class="hover:bg-gray-50 h-[52px]">
              <td class="px-4 font-mono text-[10px] text-[#001741] font-bold">${item.id}</td>
              <td class="px-4 font-semibold text-gray-900">${item.name}</td>
              <td class="px-4 text-center">${typeBadge}</td>
              <td class="px-4">${resultBadge}</td>
              <td class="px-4 font-mono text-[10px] text-gray-450">${item.date}</td>
              <td class="px-4 text-gray-700 font-semibold">${item.user}</td>
              <td class="px-4 text-right select-none">
                <div class="flex items-center justify-end gap-1">
                  <button onclick="downloadReport('${item.id}', 'PDF')" title="Download PDF Report" class="p-1 hover:bg-gray-100 hover:text-red-500 rounded text-gray-400 transition-colors">
                    <i data-lucide="file-text" class="w-4 h-4"></i>
                  </button>
                  <button onclick="downloadReport('${item.id}', 'Excel')" title="Download Excel Sheet" class="p-1 hover:bg-gray-100 hover:text-green-600 rounded text-gray-400 transition-colors">
                    <i data-lucide="file-spreadsheet" class="w-4 h-4"></i>
                  </button>
                </div>
              </td>
            </tr>
          `;
        }).join('');

      } else if (currentTab === 'audit') {
        title.innerText = "Compliance Modification Audit Trails";
        dataList = dataOverride || auditData;
        countLabel.innerText = `Showing ${dataList.length} compliance action markers`;

        tableHeadHtml = `
          <tr class="bg-gray-50 border-b border-[#e5e5e5] text-xs font-semibold text-gray-500 uppercase tracking-wider">
            <th class="py-3 px-4 font-mono w-28">Audit ID</th>
            <th class="py-3 px-4">Event Type</th>
            <th class="py-3 px-4 font-mono w-32">Target Profile</th>
            <th class="py-3 px-4">User</th>
            <th class="py-3 px-4 font-mono w-44">Timestamp</th>
            <th class="py-3 px-4">Resulting Action</th>
            <th class="py-3 px-4">Compliance Comments</th>
          </tr>
        `;

        tableBodyHtml = dataList.map(item => `
          <tr class="hover:bg-gray-50 h-[52px]">
            <td class="px-4 font-mono text-[10px] text-gray-800 font-bold">${item.id}</td>
            <td class="px-4 text-gray-900 font-semibold">${item.event}</td>
            <td class="px-4 font-mono text-[10px] text-[#001741] font-bold">${item.target}</td>
            <td class="px-4 text-gray-700">${item.user}</td>
            <td class="px-4 font-mono text-[10px] text-gray-400">${item.time}</td>
            <td class="px-4 text-gray-800 font-semibold">${item.action}</td>
            <td class="px-4 text-gray-500 max-w-xs truncate" title="${item.comment}">${item.comment}</td>
          </tr>
        `).join('');

      } else if (currentTab === 'database') {
        title.innerText = "FCA / FinCEN Global Database Updates";
        dataList = dataOverride || databaseData;
        countLabel.innerText = `Showing ${dataList.length} sync roster updates`;

        tableHeadHtml = `
          <tr class="bg-gray-50 border-b border-[#e5e5e5] text-xs font-semibold text-gray-500 uppercase tracking-wider">
            <th class="py-3 px-4">Watchlist Feed Name</th>
            <th class="py-3 px-4">Source Provider</th>
            <th class="py-3 px-4 w-28 text-center">Status</th>
            <th class="py-3 px-4 text-right w-36">Total Records</th>
            <th class="py-3 px-4 text-right w-24">Insertions</th>
            <th class="py-3 px-4 text-right w-24">Deletions</th>
            <th class="py-3 px-4 font-mono text-right w-48">Last Refreshed</th>
          </tr>
        `;

        tableBodyHtml = dataList.map(item => `
          <tr class="hover:bg-gray-50 h-[52px]">
            <td class="px-4 font-semibold text-gray-900">${item.reference}</td>
            <td class="px-4 text-gray-600 font-medium">${item.provider}</td>
            <td class="px-4 text-center">
              <span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-[10px] font-semibold bg-[#ebfbf5] text-[#00dc8d] border border-[#9df0cc]">
                <span class="w-1.5 h-1.5 bg-[#00dc8d] rounded-full"></span>
                ${item.status}
              </span>
            </td>
            <td class="px-4 text-right font-mono text-gray-800 font-semibold">${item.records}</td>
            <td class="px-4 text-right font-mono text-emerald-600">+${item.insertions}</td>
            <td class="px-4 text-right font-mono text-red-500">-${item.deletions}</td>
            <td class="px-4 font-mono text-right text-gray-400 text-[10px]">${item.syncDate}</td>
          </tr>
        `).join('');

      } else if (currentTab === 'batch') {
        title.innerText = "Bulk Batch Upload Execution Reports";
        dataList = dataOverride || batchData;
        countLabel.innerText = `Showing ${dataList.length} completed upload registers`;

        tableHeadHtml = `
          <tr class="bg-gray-50 border-b border-[#e5e5e5] text-xs font-semibold text-gray-500 uppercase tracking-wider">
            <th class="py-3 px-4 font-mono w-28">Batch ID</th>
            <th class="py-3 px-4">Batch Name</th>
            <th class="py-3 px-4 w-28 text-center">Scope Type</th>
            <th class="py-3 px-4 text-right w-28">Size (Names)</th>
            <th class="py-3 px-4 text-right w-28">Success Rate</th>
            <th class="py-3 px-4 text-center w-28">Watchlist Hits</th>
            <th class="py-3 px-4 text-center w-28">Unresolved Alerts</th>
            <th class="py-3 px-4 font-mono text-right w-48">Completion Date</th>
          </tr>
        `;

        tableBodyHtml = dataList.map(item => {
          const typeBadge = item.scope === 'Individual' 
            ? `<span class="px-1.5 py-0.5 rounded bg-teal-light text-navy text-[10px] font-mono">Individual</span>`
            : `<span class="px-1.5 py-0.5 rounded bg-blue-50 text-blue-700 text-[10px] font-mono">${item.scope}</span>`;
            
          return `
            <tr class="hover:bg-gray-50 h-[52px]">
              <td class="px-4 font-mono text-[10px] text-gray-800 font-bold">${item.id}</td>
              <td class="px-4 font-semibold text-gray-900">${item.name}</td>
              <td class="px-4 text-center">${typeBadge}</td>
              <td class="px-4 text-right font-mono text-gray-750">${item.size}</td>
              <td class="px-4 text-right font-mono text-[#15803d] font-semibold">${item.rate}</td>
              <td class="px-4 text-center font-mono text-red-500 font-semibold">${item.matches}</td>
              <td class="px-4 text-center">
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-[#fee2e2] text-[#ef4444] border border-[#ef4444]/20">${item.unresolved}</span>
              </td>
              <td class="px-4 font-mono text-right text-gray-400 text-[10px]">${item.compDate}</td>
            </tr>
          `;
        }).join('');
      }

      thead.innerHTML = tableHeadHtml;
      tbody.innerHTML = tableBodyHtml || `
        <tr>
          <td colspan="10" class="py-12 text-center text-gray-400 font-semibold uppercase">
            <i data-lucide="folder-search" class="w-10 h-10 text-gray-300 mx-auto mb-3"></i>
            No matching report records located
          </td>
        </tr>
      `;

      if (window.lucide) {
        window.lucide && window.lucide.createIcons();
      }
    }

    // Trigger report download toast
    function downloadReport(id, format) {
      showToast(`Initiating download: Report_${id}.${format === 'PDF' ? 'pdf' : 'xlsx'}...`);
    }

    // Dynamic filtering
    function applyReportFilters(e) {
      e.preventDefault();
      
      const dateFrom = document.getElementById("filter-date-from").value;
      const dateTo = document.getElementById("filter-date-to").value;
      const scopeVal = document.getElementById("filter-scope").value;
      const userVal = document.getElementById("filter-user").value;

      let sourceList = [];
      if (currentTab === 'screening') sourceList = screeningData;
      else if (currentTab === 'audit') sourceList = auditData;
      else if (currentTab === 'database') sourceList = databaseData;
      else if (currentTab === 'batch') sourceList = batchData;

      const filtered = sourceList.filter(item => {
        // Filter by scope (Only for Screening & Batches)
        if (scopeVal !== 'ALL') {
          if (currentTab === 'screening' && item.type !== scopeVal) return false;
          if (currentTab === 'batch' && item.scope !== scopeVal) return false;
        }

        // Filter by analyst/user
        if (userVal !== 'ALL' && item.user !== userVal) return false;

        return true;
      });

      renderTable(filtered);
      showToast(`Logs filtered. Found ${filtered.length} matching entries.`, false);
    }

    // Reset report filters
    function resetReportFilters() {
      document.getElementById("filter-date-from").value = "";
      document.getElementById("filter-date-to").value = "";
      document.getElementById("filter-scope").value = "ALL";
      document.getElementById("filter-user").value = "ALL";
      renderTable();
    }

    // Simulated report creation
    function triggerGenerateReport() {
      const btn = document.getElementById("btn-generate");
      btn.innerHTML = `<svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Generating Roster...`;
      btn.disabled = true;

      showToast("Compiling compliance logs into unified PDF/Excel formats...");

      setTimeout(() => {
        btn.innerHTML = `<i data-lucide="file-text" class="w-4 h-4"></i> <span>Generate Custom Report</span>`;
        btn.disabled = false;
        if (window.lucide) window.lucide && window.lucide.createIcons();
        showToast("Compliance report generated! Triggering browser download.", true);
      }, 2000);
    }


  </script>
</body>
</html>
